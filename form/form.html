<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Development Registration | JayzWink</title>

    <style>
        :root {
            --bg: #e3dce0;
            --primary: #8ec5fc;
            --accent: #ff00db;
            --text-dark: #2b2b2b;
            --border: rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Poppins", sans-serif;
        }

        body {
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .form-wrapper {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            padding: 2px;
            border-radius: 18px;
            width: 100%;
            max-width: 480px;
        }

        .form-box {
            background: #ffffff;
            border-radius: 16px;
            padding: 30px;
        }

        h2 {
            text-align: center;
            color: var(--accent);
            margin-bottom: 6px;
        }

        .subtitle {
            text-align: center;
            color: #555;
            font-size: 14px;
            margin-bottom: 22px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            font-size: 13px;
            color: var(--text-dark);
            margin-bottom: 6px;
            display: block;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 11px;
            border-radius: 8px;
            border: 1px solid var(--border);
            font-size: 14px;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(255, 0, 219, 0.15);
        }

        textarea {
            resize: none;
        }

        button {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border: none;
            border-radius: 10px;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: transform 0.2s ease;
        }

        button:hover {
            transform: translateY(-1px);
        }

        .note {
            text-align: center;
            font-size: 12px;
            color: #666;
            margin-top: 14px;
        }
    </style>
</head>

<body>

    <div class="form-wrapper">
        <div class="form-box">
            <form action="https://formspree.io/f/mqebgejg" method="POST" id="regForm">
                <h2>Web Development Registration</h2>
                <p class="subtitle">Start your journey into modern web development</p>

                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="name" required>
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="email" required>
                </div>

                <div class="form-group">
                    <label>WhatsApp Number</label>
                    <input type="tel" name="whatsapp" required>
                </div>

                <div class="form-group">
                    <label>Education Level</label>
                    <select name="education" required>
                        <option value="">Select</option>
                        <option>School Student</option>
                        <option>College Student</option>
                        <option>University Student</option>
                        <option>Self Learner</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Skill Level</label>
                    <select name="skill_level" required>
                        <option value="">Select</option>
                        <option>Beginner</option>
                        <option>Intermediate</option>
                        <option>Advanced</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Why do you want to learn Web Development?</label>
                    <textarea name="reason" rows="3" required></textarea>
                </div>

                <input type="hidden" name="_subject" value="New Web Development Student Registration">

                <button type="submit">Register Now</button>

                <p class="note">We’ll contact you on WhatsApp after registration</p>
            </form>
        </div>
    </div>

    <script>
        document.getElementById("regForm").addEventListener("submit", () => {
            alert("Registration submitted successfully 🚀");
        });
    </script>

</body>

</html>
